name: CI Keep White Space

on:
  push:
    branches:
      - '**'          # S'active sur un push sur n'importe quelle branche
  pull_request:
    branches:
      - main          # S'active sur une PR visant la branche principale
  workflow_dispatch:  # Permet le lancement manuel

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Security Audit (npm audit)
        run: npm audit --audit-level=moderate

      - name: Linting (Google Style Guide)
        run: npm run lint

      - name: Run Tests with Annotations
        run: npm test

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Connexion au registre de GitHub
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build et Push sur GitHub
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # L'image sera stockée dans les "Packages" GitHub
          tags: ghcr.io/${{ github.repository_owner }}/keep-white-space:latest