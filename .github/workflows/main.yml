name: CI Keep White Space

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

jobs:
  # Étape DevSecOps ajoutée Détection de secrets
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Important pour que Gitleaks puisse scanner l'historique
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-test:
    needs: secrets-scan # On ne teste que si aucun secret n'est exposé
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Security Audit (npm audit)
        run: npm audit --audit-level=moderate

      - name: Linting (Google Style Guide)
        run: npm run lint

      - name: Run Tests with Annotations
        run: npm test

  deploy-docker:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo holder
        run: |
          echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/keep-white-space:latest

  publish-pages:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Pages
        uses: actions/configure-pages@v6
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.' # Dossier contenant l'index.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5